# DoLike Docker Compose 配置

# 项目使用 SQLite 作为数据库（单文件、本地零配置），无需额外数据库容器。
# 数据通过 volume 持久化到宿主机 ./data 目录。

version: "3.8"

services:
  server:
    build:
      context: .
      dockerfile: server/Dockerfile
    container_name: dolike-server
    restart: unless-stopped
    ports:
      - "7777:3000"            # 宿主机:容器，容器内默认 3000
    environment:
      - NODE_ENV=production
      - PORT=3000
      - ARCHIVE_ROOT=/data
      - DATABASE_URL=file:/data/db/app.sqlite
      - LOG_LEVEL=info
      - LOG_PRETTY=false
    volumes:
      - ./data:/data            # 数据持久化：归档内容、数据库、日志
    healthcheck:
      test: ["CMD", "node", "-e", "require('undici').request('http://localhost:3000/api/health').then(r => process.exit(r.statusCode === 200 ? 0 : 1))"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 30s
